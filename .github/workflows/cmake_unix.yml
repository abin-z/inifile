name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
  pull_request:

jobs:
  unix_ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    name: ${{ matrix.os }} ${{ matrix.build_type }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DINIFILE_BUILD_TESTS=ON \
          -DINIFILE_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run tests
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

      - name: Install library
        run: cmake --install build --prefix "${PWD}/install"

      - name: Test installed library
        run: |
          cmake -S tests/installed_test -B build_installed -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_PREFIX_PATH="${PWD}/install"
          cmake --build build_installed --parallel

      - name: Test FetchContent usage
        run: |
          cmake -S tests/fetchcontent_test -B build_fetchcontent -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          cmake --build build_fetchcontent --parallel