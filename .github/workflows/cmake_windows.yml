name: Windows

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
  pull_request:

jobs:
  windows_ci:
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang, mingw]
        build_type: [Debug, Release]

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Compiler
        shell: pwsh
        run: |
          if ('${{ matrix.compiler }}' -eq 'clang') {
            Write-Host "Using Clang from LLVM"
          } elseif ('${{ matrix.compiler }}' -eq 'msvc') {
            Write-Host "Using MSVC (default)"
          } else {
            Write-Host "Using MinGW (GCC)"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          if ('${{ matrix.compiler }}' -eq 'msvc') {
            cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          } elseif ('${{ matrix.compiler }}' -eq 'clang') {
            cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          } else {
            cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          }

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run tests
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

      - name: Install library
        run: cmake --install build --prefix "${PWD}/install"

      - name: Test installed library
        shell: pwsh
        run: |
          $install_path = "${PWD}/install"

          if ('${{ matrix.compiler }}' -eq 'msvc') {
              cmake -S tests/installed_test -B build_installed -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$install_path"
              cmake --build build_installed --config ${{ matrix.build_type }} --parallel
          } else {
              $cc_name = if ('${{ matrix.compiler }}' -eq 'clang') { 'clang' } else { 'gcc' }
              $cxx_name = if ('${{ matrix.compiler }}' -eq 'clang') { 'clang++' } else { 'g++' }
              cmake -S tests/installed_test -B build_installed -G Ninja -DCMAKE_C_COMPILER="$cc_name" -DCMAKE_CXX_COMPILER="$cxx_name" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_PREFIX_PATH="$install_path"
              cmake --build build_installed --parallel
          }

      - name: Test FetchContent usage
        shell: pwsh
        run: |
          if ('${{ matrix.compiler }}' -eq 'msvc') {
              cmake -S tests/fetchcontent_test -B build_fetchcontent -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
              cmake --build build_fetchcontent --config ${{ matrix.build_type }} --parallel
          } else {
              $cc_name = if ('${{ matrix.compiler }}' -eq 'clang') { 'clang' } else { 'gcc' }
              $cxx_name = if ('${{ matrix.compiler }}' -eq 'clang') { 'clang++' } else { 'g++' }

              cmake -S tests/fetchcontent_test -B build_fetchcontent `
                -G Ninja `
                -DCMAKE_C_COMPILER="$cc_name" `
                -DCMAKE_CXX_COMPILER="$cxx_name" `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

              cmake --build build_fetchcontent --parallel
          }